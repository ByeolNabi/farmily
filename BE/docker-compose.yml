version: '3.8'

services:
  # 1. PostgreSQL 데이터베이스
  db:
    image: postgis/postgis:15-3.3
    container_name: farmily-db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env  # .env 파일을 읽어옵니다
    environment:
      POSTGRES_DB: ${POSTGRES_DB}            # .env에서 값 대입
      POSTGRES_USER: ${POSTGRES_USER}        # .env에서 값 대입
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # .env에서 값 대입
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - farmily-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis
  redis:
    image: redis:alpine
    container_name: farmily-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - farmily-network

  # 3. Spring Boot
  spring:
    image: eclipse-temurin:17-jre-alpine
    container_name: farmily-spring
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./farmily-spring/build/libs:/app
    working_dir: /app
    command: java -jar farmily-0.0.1-SNAPSHOT.jar
    env_file:
      - .env  # .env 파일을 읽어서 컨테이너에 모든 변수를 주입합니다 (MAIL_PASSWORD 포함)
    environment:
      # 명시적으로 .env 값을 매핑 (가독성을 위해 남겨둠)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT}
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - farmily-network

  farmily-fastapi:  # <--- FastAPI 추가
    build: ./FastAPI_폴더_경로
    container_name: farmily-fastapi
    ports:
      - "8000:8000" # FastAPI 포트
    depends_on:
      - db
    networks:
      - farmily-network # <--- 핵심! 같은 네트워크 명찰 달기
    environment:
      - DB_HOST=farmily-db  # <--- localhost 아님! 컨테이너 이름으로 접속
      - DB_PORT=5432
      - DB_USER=ssafy
      - DB_PASSWORD=...

volumes:
  postgres_data:

networks:
  farmily-network:
    driver: bridge