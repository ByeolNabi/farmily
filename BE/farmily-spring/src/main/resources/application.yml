spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: "team.farmily@gmail.com"
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    # [수정 핵심] 기본값을 'farmily-db' -> 'localhost'로 변경!
    # 이유: 로컬에서 실행할 땐 터널(localhost)을 타야 하고,
    #       Docker(배포)에서는 docker-compose가 이 값을 'farmily-db'로 덮어씌워 줍니다.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/farmily_db}
    username: ${SPRING_DATASOURCE_USERNAME:ssafy}
    password: ${SPRING_DATASOURCE_PASSWORD} # 로컬 실행 시엔 환경변수나 run configuration으로 비번 주입 필요
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      # Redis도 터널링 쓴다면 localhost, 아니면 로컬에 켜둔 Redis 사용
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080