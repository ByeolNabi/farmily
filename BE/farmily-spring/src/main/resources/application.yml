spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: "team.farmily@gmail.com"
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    # [수정 핵심] 기본값을 'farmily-db' -> 'localhost'로 변경!
    # 이유: 로컬에서 실행할 땐 터널(localhost)을 타야 하고,
    #       Docker(배포)에서는 docker-compose가 이 값을 'farmily-db'로 덮어씌워 줍니다.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/farmily_db}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      # Redis도 터널링 쓴다면 localhost, 아니면 로컬에 켜둔 Redis 사용
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

farmily:
  device:
    api-key: ${DEVICE_API_KEY}

  # MQTT 설정
  mqtt:
    # 기본값: 로컬(mosquitto), EC2는 환경변수로 덮어씀
    broker-url: tcp://${MQTT_HOST:mosquitto}:${MQTT_PORT:1883}
    client-id: farmily-spring-server
    topic: robot/weather

  # 날씨 API
  weather:
    api-key: ${OPENWEATHER_API_KEY}
    url: https://api.openweathermap.org/data/2.5/weather
