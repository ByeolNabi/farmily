spring:
  config:
    activate:
      on-profile: default # 기본 프로필 (로컬 개발용)

  mail:
    host: smtp.gmail.com
    port: 587
    username: "team.farmily@gmail.com"
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    # [핵심]
    # 로컬: SSH 터널을 통해 내 컴퓨터 5433 포트가 -> EC2 5432로 연결됨
    # 배포: 환경변수가 주입되어 farmily-db 컨테이너로 연결됨
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/farmily_db}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      # 로컬: SSH 터널을 통해 내 컴퓨터 6379 -> EC2 6379
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  jpa:
    hibernate:
      # 로컬에선 update로 편하게 쓰고, 운영에선 validate 등을 권장하지만 일단 update 유지
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

farmily:
  device:
    api-key: ${DEVICE_API_KEY}

  mqtt:
    # [핵심] Nginx를 통하지 않고 터널링으로 직접 1883 포트에 꽂습니다.
    # Nginx가 80/443을 잡고 있어도, 1883은 별도 포트라 터널링에 문제없습니다.
    broker-url: tcp://${MQTT_HOST:localhost}:${MQTT_PORT:1883}
    client-id: farmily-spring-local # 로컬이랑 서버랑 ID 겹치면 끊길 수 있어서 구분 추천
    topic: robot/weather

  weather:
    api-key: ${OPENWEATHER_API_KEY}
    url: https://api.openweathermap.org/data/2.5/weather