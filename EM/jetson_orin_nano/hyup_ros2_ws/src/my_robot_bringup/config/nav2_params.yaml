amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"
    min_particles: 200
    max_particles: 2000
    update_min_d: 0.10
    update_min_a: 0.10
    resample_interval: 1
    transform_tolerance: 0.3

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.3

    # DWB 기본 컨트롤러 사용 (초기엔 무난)
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      max_vel_x: 0.12          # ★ 매우 저속
      min_vel_y: 0.0
      max_vel_y: 0.0
      max_vel_theta: 0.5       # ★ 회전도 낮게
      min_speed_xy: 0.0
      max_speed_xy: 0.12
      min_speed_theta: 0.0

      acc_lim_x: 0.3
      dec_lim_x: -0.3
      acc_lim_theta: 1.0
      dec_lim_theta: -1.0

      vx_samples: 10
      vtheta_samples: 10
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.05

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.3

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""   # launch에서 주입

behavior_server:
  ros__parameters:
    use_sim_time: false

waypoint_follower:
  ros__parameters:
    use_sim_time: false

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 10.0
    max_velocity: [0.12, 0.0, 0.5]
    min_velocity: [0.0, 0.0, -0.5]
    max_accel: [0.3, 0.0, 1.0]
    max_decel: [-0.3, 0.0, -1.0]